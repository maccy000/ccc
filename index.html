<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oraculum - 運命の審判</title>
    <style>
        :root {
            --deep-blue: #020617;
            --gold: #d4af37;
            --silver: #e2e8f0;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Times New Roman', serif;
            background: var(--deep-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--silver);
            overflow: hidden;
            transition: background 2s ease;
        }

        /* 動的な背景星空 */
        #stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: -1;
        }

        .container {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        .rank-badge {
            font-size: 0.7rem;
            letter-spacing: 0.3rem;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 5px 15px;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .current-streak { font-size: 6rem; font-weight: 100; margin: 0; line-height: 1; }
        
        .event-banner { height: 60px; color: var(--accent); font-style: italic; margin: 15px 0; font-size: 0.9rem; }

        .btn-group { display: flex; gap: 20px; margin: 20px 0; }
        
        .door-btn {
            background: transparent;
            color: var(--silver);
            border: 1px solid var(--silver);
            padding: 20px;
            flex: 1;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.2rem;
        }
        .door-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        /* 特殊状態 */
        .golden-door { border-color: var(--gold) !important; box-shadow: 0 0 20px var(--gold); }
        .invisible { opacity: 0; pointer-events: none; }

        .choice-ui {
            display: none;
            padding: 20px;
            border: 1px double var(--gold);
            margin-top: 20px;
            animation: fadeIn 1s;
        }

        .reset-btn { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold); 
            display: none; width: 100%; padding: 15px; cursor: pointer; margin-top: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-4px,2px); } 75% { transform: translate(4px,-2px); } }
        .shake { animation: shake 0.1s infinite; }
    </style>
</head>
<body>

<div id="stars"></div>

<div class="container" id="main-container">
    <div id="rank" class="rank-badge">NOVICE</div>
    <div id="streak" class="current-streak">0</div>
    <div id="event-text" class="event-banner"></div>

    <div id="game-ui">
        <div class="btn-group">
            <button class="door-btn" id="btn-l" onclick="handleInput(0)">SINISTER</button>
            <button class="door-btn" id="btn-r" onclick="handleInput(1)">DEXTER</button>
        </div>
    </div>

    <div id="gamble-ui" class="choice-ui">
        <p style="font-size: 0.8rem;">運命の分岐点：スコアを確定させるか？</p>
        <div class="btn-group">
            <button class="door-btn" onclick="collectScore()">安息（確定）</button>
            <button class="door-btn" style="border-color:var(--accent)" onclick="continueGamble()">渇望（続行）</button>
        </div>
    </div>

    <div id="result-ui" style="margin: 20px 0; min-height: 80px;"></div>
    <button id="reset-btn" class="reset-btn" onclick="resetGame()">再誕</button>
</div>

<script>
    let streak = 0;
    let isGolden = false;
    let isReversed = false;
    const STORAGE_KEY = 'oraculum_game_v3';

    function handleInput(choice) {
        const actual = isReversed ? 1 - choice : choice;
        const winRate = isGolden ? 0.8 : 0.5;
        
        if (Math.random() < winRate) {
            streak++;
            updateUI();
            if (streak > 0 && streak % 5 === 0) {
                showGamble();
            } else {
                if (streak % 3 === 0) triggerEvent();
                else clearEvent();
            }
        } else {
            gameOver();
        }
    }

    function updateUI() {
        document.getElementById('streak').innerText = streak;
        const rank = document.getElementById('rank');
        const bg = document.getElementById('stars');
        
        if (streak < 5) { rank.innerText = "PILGRIM (巡礼者)"; bg.style.opacity = "0.3"; }
        else if (streak < 10) { rank.innerText = "OBSERVER (観測者)"; bg.style.opacity = "0.6"; bg.style.filter = "hue-rotate(45deg)"; }
        else if (streak < 20) { rank.innerText = "TRANSCENDER (超越者)"; bg.style.opacity = "1"; bg.style.filter = "hue-rotate(180deg)"; }
        else { rank.innerText = "ORACLE (神託者)"; bg.style.filter = "contrast(1.5) brightness(1.2)"; }
    }

    function triggerEvent() {
        clearEvent();
        const evs = [
            { t: "黄金の刻", d: "天啓：成功率が大幅に上昇", f: () => { isGolden = true; document.querySelectorAll('.door-btn').forEach(b => b.classList.add('golden-door')); }},
            { t: "混沌の渦", d: "試練：世界が震え、左右が逆転する", f: () => { isReversed = true; document.getElementById('main-container').classList.add('shake'); }},
            { t: "忘却の霧", d: "試練：扉の文字が消え去る", f: () => { document.querySelectorAll('.door-btn').forEach(b => b.style.color = 'transparent'); }}
        ];
        const e = evs[Math.floor(Math.random() * evs.length)];
        document.getElementById('event-text').innerHTML = `― ${e.t} ―<br><small>${e.d}</small>`;
        e.f();
    }

    function clearEvent() {
        isGolden = false; isReversed = false;
        document.getElementById('event-text').innerHTML = "";
        const mc = document.getElementById('main-container');
        mc.classList.remove('shake');
        document.querySelectorAll('.door-btn').forEach(b => {
            b.classList.remove('golden-door');
            b.style.color = '';
        });
    }

    function showGamble() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('gamble-ui').style.display = 'block';
        document.getElementById('event-text').innerHTML = "― 運命の停滞 ―<br><small>ここで退けば記録は守られる</small>";
    }

    function collectScore() {
        gameOver("賢明な判断です。運命を確定させました。");
    }

    function continueGamble() {
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('gamble-ui').style.display = 'none';
        clearEvent();
        document.getElementById('result-ui').innerHTML = "強欲な魂に幸運を。";
    }

    function gameOver(msg = "審判が下りました。") {
        clearEvent();
        const prob = (Math.pow(0.5, streak) * 100).toFixed(6);
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('gamble-ui').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'block';
        document.getElementById('result-ui').innerHTML = `
            <span style="color:var(--gold);">${msg}</span><br>
            生存率: ${prob}% / 階位: ${document.getElementById('rank').innerText}
        `;
        saveRanking();
    }

    function saveRanking() {
        let r = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        r.push({s: streak, d: new Date().toLocaleDateString()});
        r.sort((a,b) => b.s - a.s);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(r.slice(0,5)));
    }

    function resetGame() {
        streak = 0; updateUI(); clearEvent();
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('result-ui').innerHTML = "";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oraculum - 運命の六分儀</title>
    <style>
        :root {
            --deep-blue: #0f172a;
            --serene-blue: #1e293b;
            --gold: #d4af37;
            --silver: #e2e8f0;
            --accent: #f59e0b;
            --error: #ef4444;
        }

        body {
            font-family: 'Times New Roman', serif;
            background: var(--deep-blue);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 40px);
            background-size: 100px 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--silver);
            overflow: hidden;
        }

        .container {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border: 1px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center;
            width: 90%;
            max-width: 500px;
            transition: all 0.5s ease;
        }

        .title { letter-spacing: 0.5rem; font-size: 0.8rem; color: var(--gold); margin-bottom: 2rem; }
        .current-streak { font-size: 5rem; font-weight: 100; color: var(--silver); margin: 0.5rem 0; font-family: 'Georgia', serif; }
        
        .event-banner { height: 50px; color: var(--accent); font-style: italic; margin-bottom: 10px; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; }
        .timer-bar-container { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-bottom: 20px; display: none; }
        #timer-bar { width: 100%; height: 100%; background: var(--gold); transition: width 0.1s linear; }

        .btn-group { display: flex; gap: 20px; margin: 30px 0; justify-content: center; }
        
        .door-btn {
            background: transparent;
            color: var(--silver);
            border: 1px solid var(--silver);
            padding: 20px;
            letter-spacing: 0.2rem;
            flex: 1;
            transition: all 0.3s;
            cursor: pointer;
        }
        .door-btn:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); color: var(--gold); }
        
        /* 特殊状態スタイル */
        .golden-door { border-color: var(--gold) !important; color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); }
        .invisible-text { color: transparent !important; }
        .mini-btn { transform: scale(0.6); }

        .reset-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); display: none; width: 100%; padding: 15px; margin-top: 20px; cursor: pointer; letter-spacing: 0.2rem; }
        .result-area { min-height: 100px; margin: 20px 0; line-height: 1.8; }

        @keyframes subtle-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
        .shake { animation: subtle-shake 0.15s infinite; }

        .ranking-box { margin-top: 30px; border-top: 1px solid rgba(212, 175, 55, 0.2); padding-top: 15px; font-size: 0.7rem; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="title">ORACULUM</div>
    <div id="event-text" class="event-banner"></div>
    <div class="timer-bar-container" id="timer-container"><div id="timer-bar"></div></div>
    
    <div id="streak" class="current-streak">0</div>

    <div id="game-ui">
        <div class="btn-group" id="btn-group">
            <button class="door-btn" id="btn-0" onclick="handleSelect(0)">SINISTER</button>
            <button class="door-btn" id="btn-1" onclick="handleSelect(1)">DEXTER</button>
        </div>
    </div>

    <div id="result-ui" class="result-area"></div>
    <button id="reset-btn" class="reset-btn" onclick="resetGame()">REAWAKEN</button>

    <div class="ranking-box" id="ranking-list"></div>
</div>

<script>
    let streak = 0;
    let isGolden = false;
    let isReversed = false;
    let timerInterval = null;
    const STORAGE_KEY = 'oraculum_hex_rankings';

    function handleSelect(choice) {
        // 反転イベント用
        const actualChoice = isReversed ? (1 - choice) : choice;
        play(actualChoice);
    }

    function play(choice) {
        clearInterval(timerInterval);
        const winThreshold = isGolden ? 0.75 : 0.5;
        const isWin = Math.random() < winThreshold;

        if (isWin) {
            streak++;
            document.getElementById('streak').innerText = streak;
            document.getElementById('result-ui').innerHTML = "運命は継続を許可しました。";
            endEvent();
            if (streak % 3 === 0) triggerRandomEvent();
        } else {
            gameOver();
        }
    }

    function triggerRandomEvent() {
        const events = [
            { name: "星々の導き", detail: "天啓により生存率が上昇する", action: () => { 
                isGolden = true; 
                document.querySelectorAll('.door-btn').forEach(b => b.classList.add('golden-door'));
            }},
            { name: "運命の揺らぎ", detail: "因果が歪み、世界が震える", action: () => { 
                document.getElementById('main-container').classList.add('shake');
            }},
            { name: "静寂の刻", detail: "導きの文字が消え去る", action: () => { 
                document.querySelectorAll('.door-btn').forEach(b => b.classList.add('invisible-text'));
            }},
            { name: "双子の月", detail: "選択の門が遠のき、小さくなる", action: () => { 
                document.querySelectorAll('.door-btn').forEach(b => b.classList.add('mini-btn'));
            }},
            { name: "共鳴する魂", detail: "左右の理が逆転する", action: () => { 
                isReversed = true;
                document.getElementById('event-text').style.color = 'var(--error)';
            }},
            { name: "時の砂時計", detail: "猶予は5秒。迷いは死を招く", action: () => { 
                startTimer(5);
            }}
        ];

        const ev = events[Math.floor(Math.random() * events.length)];
        document.getElementById('event-text').innerHTML = `― ${ev.name} ―<br><small>${ev.detail}</small>`;
        ev.action();
    }

    function startTimer(seconds) {
        const container = document.getElementById('timer-container');
        const bar = document.getElementById('timer-bar');
        container.style.display = 'block';
        let timeLeft = seconds;
        
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            bar.style.width = (timeLeft / seconds * 100) + "%";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameOver("刻限が過ぎました。");
            }
        }, 100);
    }

    function endEvent() {
        isGolden = false;
        isReversed = false;
        clearInterval(timerInterval);
        document.getElementById('event-text').innerText = "";
        document.getElementById('event-text').style.color = 'var(--accent)';
        document.getElementById('timer-container').style.display = 'none';
        const container = document.getElementById('main-container');
        container.classList.remove('shake');
        document.querySelectorAll('.door-btn').forEach(b => {
            b.className = 'door-btn';
        });
    }

    function gameOver(reason = "審判が下りました。") {
        endEvent();
        const prob = (Math.pow(0.5, streak) * 100).toFixed(streak > 10 ? 6 : 2);
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'block';
        document.getElementById('result-ui').innerHTML = `
            <span style="color:var(--gold);">${reason}</span><br>
            到達確率: ${prob}%<br>
            <small>${streak >= 10 ? "あなたは理を超越しました。" : "運命の糸が尽きました。"}</small>
        `;
        saveScore(streak);
        updateRankingDisplay();
    }

    function saveScore(s) {
        if (s === 0) return;
        let rankings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        rankings.push({ score: s, date: new Date().toLocaleDateString() });
        rankings.sort((a, b) => b.score - a.score);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(rankings.slice(0, 3)));
    }

    function updateRankingDisplay() {
        const list = document.getElementById('ranking-list');
        const rankings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        list.innerHTML = rankings.map((r, i) => `Rank ${i+1}: ${r.score} Steps (${r.date})`).join(' | ');
    }

    function resetGame() {
        streak = 0;
        document.getElementById('streak').innerText = "0";
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('result-ui').innerHTML = "";
        endEvent();
    }
    
    updateRankingDisplay();
</script>

</body>
</html>

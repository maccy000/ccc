<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oraculum - 慈悲の審判</title>
    <style>
        :root {
            --deep-blue: #020617;
            --gold: #d4af37;
            --silver: #e2e8f0;
            --accent: #f59e0b;
            --safety: #34d399;
            --error: #ef4444;
        }

        body {
            font-family: 'Times New Roman', serif;
            background: var(--deep-blue);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: var(--silver); overflow: hidden;
        }

        #stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            opacity: 0.5;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
        }

        .content-box {
            max-width: 480px; width: 85%; padding: 2rem;
            border: 1px solid var(--gold); text-align: center;
            background: rgba(15, 23, 42, 0.9);
        }

        .content-box h2 { color: var(--gold); letter-spacing: 0.4rem; margin-bottom: 1rem; }
        
        .online-ranking {
            margin: 1rem 0; padding: 0.5rem; border-top: 1px solid rgba(212, 175, 55, 0.3);
            max-height: 180px; overflow-y: auto; font-size: 0.8rem; text-align: left;
        }
        .rank-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px); padding: 2.5rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center; width: 90%; max-width: 500px; display: none;
        }

        .life-area { color: var(--safety); font-size: 0.8rem; margin-bottom: 10px; letter-spacing: 0.2rem; }
        .rank-badge { font-size: 0.7rem; letter-spacing: 0.3rem; color: var(--gold); border: 1px solid var(--gold); padding: 5px 15px; display: inline-block; margin-bottom: 1rem; }
        
        /* 星々の記憶（履歴表示） */
        .history-orbit {
            position: relative; width: 150px; height: 150px; margin: 0 auto;
            display: flex; justify-content: center; align-items: center;
        }
        .current-streak { font-size: 5rem; font-weight: 100; margin: 0; z-index: 2; }
        .history-star {
            position: absolute; width: 6px; height: 6px; background: var(--gold);
            border-radius: 50%; box-shadow: 0 0 10px var(--gold);
            transition: all 1s ease; opacity: 0.6;
        }

        .message-area { height: 60px; color: var(--accent); font-style: italic; margin: 15px 0; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-direction: column; }

        .timer-bar-container { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 5px; display: none; }
        #timer-bar { width: 100%; height: 100%; background: var(--gold); transition: width 0.1s linear; }

        .btn-group { display: flex; gap: 12px; margin: 20px 0; justify-content: center; }
        button {
            background: transparent; color: var(--silver); border: 1px solid var(--silver);
            padding: 15px; cursor: pointer; transition: all 0.3s;
            letter-spacing: 0.1rem; font-family: inherit; flex: 1;
        }
        button:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .hint { border-color: var(--safety) !important; box-shadow: 0 0 15px var(--safety); color: var(--safety) !important; }
        .special-panel { display: none; border: 1px double var(--gold); padding: 15px; margin-top: 15px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="stars"></div>

<div id="intro-overlay" class="overlay">
    <div class="content-box">
        <h2>ORACULUM</h2>
        <div id="online-rank-list" class="online-ranking">
            <div style="text-align:center; opacity:0.5; padding: 20px;">記録を読み込み中...</div>
        </div>
        <p style="font-size:0.7rem; opacity:0.6; margin-bottom:1rem;">― 過去の聖遺録 ―</p>
        <button style="width:100%; border-color:var(--gold); color:var(--gold);" onclick="startGame()">儀式を始める</button>
    </div>
</div>

<div class="container" id="game-container">
    <div id="life" class="life-area">✦ 守護の輝石: 1 ✦</div>
    <div id="rank" class="rank-badge">PILGRIM</div>
    
    <div class="history-orbit">
        <div id="streak" class="current-streak">0</div>
        <div id="star-container"></div>
    </div>

    <div id="message" class="message-area">
        <span id="msg-text">運命を選択してください</span>
        <div id="timer-container" class="timer-bar-container"><div id="timer-bar"></div></div>
    </div>

    <div id="standard-ui">
        <div class="btn-group">
            <button id="btn-0" onclick="play(2, 0)">SINISTER</button>
            <button id="btn-1" onclick="play(2, 1)">DEXTER</button>
        </div>
    </div>

    <div id="quad-ui" style="display:none;">
        <div class="btn-group">
            <button onclick="play(4, 0)">I</button><button onclick="play(4, 1)">II</button>
            <button onclick="play(4, 2)">III</button><button onclick="play(4, 3)">IV</button>
        </div>
    </div>

    <div id="branch-ui" class="special-panel">
        <p style="font-size:0.75rem; color:var(--gold);">― 運命の分岐点 ―</p>
        <div class="btn-group">
            <button onclick="setupMode('normal')">通常の道 (1/2)</button>
            <button style="border-color:var(--accent); color:var(--accent);" onclick="setupMode('gamble')">聖者の賭け (1/3)</button>
        </div>
    </div>

    <div id="triple-ui" class="special-panel">
        <div class="btn-group">
            <button onclick="play(3, 0)">I</button><button onclick="play(3, 1)">II</button><button onclick="play(3, 2)">III</button>
        </div>
    </div>

    <div id="result-log" style="margin-top:15px; min-height:40px; font-size:0.8rem;"></div>
    
    <div id="name-entry" style="display:none; margin-top:10px;">
        <input type="text" id="player-name" placeholder="名を刻む" maxlength="10" style="background:transparent; border:1px solid var(--gold); color:var(--gold); padding:8px; text-align:center; width:60%;">
        <button onclick="submitScore()" style="flex:none; padding:8px 15px; border-color:var(--gold);">刻印</button>
    </div>
    
    <button id="reset-btn" style="display:none; width:100%; margin-top:10px; border-color:var(--gold); color:var(--gold);" onclick="location.reload()">再挑戦</button>
</div>

<script>
    let streak = 0;
    let lives = 1; 
    let isGuiding = false;
    let timerInterval = null;
    let currentEvent = null;
    let history = []; // 正解の履歴を保存
    const STORAGE_KEY = 'oraculum_actual_records';

    window.onload = () => { refreshRanking(); };

    function refreshRanking() {
        const list = document.getElementById('online-rank-list');
        const scores = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        if (scores.length === 0) {
            list.innerHTML = `<div style="text-align:center; opacity:0.3; padding:20px;">まだ聖遺録に刻まれた名はありません。</div>`;
            return;
        }
        list.innerHTML = scores.map((s, i) => `<div class="rank-row"><span>No.${i+1} ${s.name}</span><span>${s.score} Steps</span></div>`).join('');
    }

    function submitScore() {
        const name = document.getElementById('player-name').value.trim() || "名無き預言者";
        let scores = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        scores.push({name: name, score: streak, date: new Date().getTime()});
        scores.sort((a,b) => b.score - a.score);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(scores.slice(0, 10)));
        document.getElementById('name-entry').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'block';
        refreshRanking();
    }

    function startGame() {
        document.getElementById('intro-overlay').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
    }

    function setupMode(mode) {
        document.getElementById('branch-ui').style.display = 'none';
        if (mode === 'gamble') { document.getElementById('triple-ui').style.display = 'block'; } 
        else { document.getElementById('standard-ui').style.display = 'block'; }
    }

    function play(chance, choiceIndex) {
        clearInterval(timerInterval);
        document.getElementById('timer-container').style.display = 'none';
        
        // --- 案3：パターン認識アルゴリズム ---
        // 完全ランダムではなく、直前の結果に基づいたわずかな偏りを生成
        let winningNumbers;
        if (currentEvent === 'double_moon' && chance === 2) {
            winningNumbers = [0, 1];
        } else {
            let bias = Math.random();
            if (history.length > 0 && bias < 0.2) { 
                // 20%の確率で前回と同じ結果にする（連続パターン）
                winningNumbers = [history[history.length - 1] % chance];
            } else if (history.length > 0 && bias < 0.4) {
                // 20%の確率で前回と逆の結果にする（交互パターン）
                winningNumbers = [(history[history.length - 1] + 1) % chance];
            } else {
                // 残りは完全ランダム
                winningNumbers = [Math.floor(Math.random() * chance)];
            }
        }

        const isWin = winningNumbers.includes(choiceIndex);
        const correctValue = winningNumbers[0]; // 履歴保存用

        document.getElementById('standard-ui').style.display = 'none';
        document.getElementById('triple-ui').style.display = 'none';
        document.getElementById('quad-ui').style.display = 'none';
        resetEffects();

        if (isWin) {
            history.push(correctValue);
            updateHistoryStars(); // 履歴の星を更新
            
            let gain = (chance === 3) ? 2 : (chance === 4 ? 3 : 1);
            streak += gain;
            document.getElementById('streak').innerText = streak;
            if (streak % 5 === 0) isGuiding = true;
            if (Math.random() < 0.25) { triggerRandomEvent(); } 
            else if (streak % 3 === 0) { document.getElementById('branch-ui').style.display = 'block'; } 
            else { showNormalUI(); }
        } else {
            if (lives > 0) { lives--; updateLifeDisplay(); showNormalUI(); } 
            else { gameOver(); }
        }
        updateRank(); currentEvent = null;
    }

    // 履歴を可視化する「星々の記憶」
    function updateHistoryStars() {
        const container = document.getElementById('star-container');
        container.innerHTML = '';
        const maxVisible = 3;
        const recent = history.slice(-maxVisible);
        
        recent.forEach((pos, i) => {
            const star = document.createElement('div');
            star.className = 'history-star';
            // 位置によって配置（左ならマイナス、右ならプラス）
            const angle = (i / maxVisible) * Math.PI * 2;
            const x = Math.cos(angle) * 70;
            const y = Math.sin(angle) * 70;
            // 正解が左(0)なら青っぽく、右(1)なら金っぽくするなど視覚的ヒント
            star.style.backgroundColor = pos === 0 ? '#60a5fa' : '#d4af37';
            star.style.transform = `translate(${x}px, ${y}px)`;
            container.appendChild(star);
        });
    }

    function triggerRandomEvent() {
        const events = [
            { name: "流星", action: () => { lives++; updateLifeDisplay(); showNormalUI(); }},
            { name: "双月", action: () => { currentEvent = 'double_moon'; showNormalUI(); }},
            { name: "等価", action: () => { document.getElementById('quad-ui').style.display = 'block'; }},
            { name: "砂時計", action: () => { startTimer(5); showNormalUI(); }}
        ];
        events[Math.floor(Math.random() * events.length)].action();
    }

    function startTimer(sec) {
        const bar = document.getElementById('timer-bar');
        document.getElementById('timer-container').style.display = 'block';
        let timeLeft = sec;
        timerInterval = setInterval(() => {
            timeLeft -= 0.1; bar.style.width = (timeLeft / sec * 100) + "%";
            if (timeLeft <= 0) { gameOver("刻限が過ぎました。"); }
        }, 100);
    }

    function resetEffects() { document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('hint')); }

    function showNormalUI() {
        document.getElementById('standard-ui').style.display = 'block';
        if (isGuiding) {
            document.getElementById(`btn-${Math.floor(Math.random()*2)}`).classList.add('hint');
            isGuiding = false;
        }
    }

    function updateLifeDisplay() { document.getElementById('life').innerText = `✦ 守護の輝石: ${lives} ✦`; }
    function updateRank() { 
        const r = document.getElementById('rank');
        if (streak >= 10) r.innerText = "OBSERVER";
        if (streak >= 20) r.innerText = "ORACLE";
    }

    function gameOver(reason = "運命の糸が切れました") {
        clearInterval(timerInterval);
        document.getElementById('msg-text').innerText = reason;
        document.getElementById('result-log').innerHTML = `最終スコア: ${streak}`;
        document.getElementById('name-entry').style.display = 'block';
        document.getElementById('standard-ui').style.display = 'none';
        document.getElementById('triple-ui').style.display = 'none';
        document.getElementById('quad-ui').style.display = 'none';
        document.getElementById('branch-ui').style.display = 'none';
    }
</script>
</body>
</html>

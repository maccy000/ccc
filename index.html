<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oraculum - 運命の二択</title>
    <style>
        :root {
            /* 厳かな紺碧とゴールドのパレット */
            --bg-gradient: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d); /* 実際はもっと落ち着かせます */
            --deep-blue: #0f172a;
            --serene-blue: #1e293b;
            --gold: #d4af37;
            --silver: #e2e8f0;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Times New Roman', 'serif';
            background: var(--deep-blue);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--silver);
            overflow: hidden;
        }

        .container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 2px; /* あえて少し角を立たせて厳格さを */
            border: 1px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(212, 175, 55, 0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        .title {
            letter-spacing: 0.5rem;
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .score-label { font-size: 0.8rem; letter-spacing: 0.2rem; color: var(--gold); opacity: 0.8; }
        .current-streak { 
            font-size: 5rem; 
            font-weight: lighter; 
            color: var(--silver); 
            margin: 0.5rem 0;
            font-family: 'Georgia', serif;
        }

        .event-banner {
            height: 40px;
            color: var(--accent);
            font-style: italic;
            margin-bottom: 20px;
            font-size: 1rem;
            transition: all 0.5s;
        }

        .btn-group { display: flex; gap: 25px; margin: 30px 0; }
        
        button {
            cursor: pointer;
            transition: all 0.4s ease;
            font-family: inherit;
        }

        .door-btn {
            background: transparent;
            color: var(--silver);
            flex: 1;
            border: 1px solid var(--silver);
            padding: 20px;
            letter-spacing: 0.1rem;
        }
        .door-btn:hover { 
            background: rgba(212, 175, 55, 0.1); 
            border-color: var(--gold); 
            color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        /* 黄金の祝福 */
        .golden-door { 
            border: 1px solid var(--gold) !important;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5) !important;
            color: var(--gold) !important;
        }

        .reset-btn { 
            background: transparent; 
            color: var(--gold); 
            border: 1px solid var(--gold);
            display: none; 
            width: 100%; 
            padding: 15px; 
            margin-top: 20px;
            font-size: 1rem;
            letter-spacing: 0.3rem;
        }
        .reset-btn:hover { background: var(--gold); color: var(--deep-blue); }

        .result-area { min-height: 120px; margin: 20px 0; line-height: 1.8; }
        
        /* ランキング */
        .ranking-box {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            font-size: 0.75rem;
            letter-spacing: 0.1rem;
        }
        .ranking-item { display: flex; justify-content: space-between; padding: 5px; color: var(--silver); opacity: 0.7; }

        /* 静かな揺れ（試練） */
        @keyframes subtle-shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
            100% { transform: translateX(0); }
        }
        .shake { animation: subtle-shake 0.2s infinite; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="title">Divine Trial</div>
    <div id="event-text" class="event-banner"></div>
    <div class="score-label">Consecutive Success</div>
    <div id="streak" class="current-streak">0</div>

    <div id="game-ui">
        <div class="btn-group">
            <button class="door-btn" onclick="play(0)">SINISTER</button>
            <button class="door-btn" onclick="play(1)">DEXTER</button>
        </div>
    </div>

    <div id="result-ui" class="result-area"></div>
    <button id="reset-btn" class="reset-btn" onclick="resetGame()">BEGIN AGAIN</button>

    <div class="ranking-box">
        <div id="ranking-list"></div>
    </div>
</div>

<script>
    let streak = 0;
    let isGoldenEvent = false;
    const STORAGE_KEY = 'survival_serene_rankings';

    window.onload = updateRankingDisplay;

    function play(choice) {
        const winThreshold = isGoldenEvent ? 0.75 : 0.5;
        const isWin = Math.random() < winThreshold;

        if (isWin) {
            streak++;
            document.getElementById('streak').innerText = streak;
            endEvent();

            if (streak > 0 && streak % 3 === 0) {
                triggerEvent();
            } else {
                document.getElementById('result-ui').innerHTML = `<span style="color: var(--silver);">道は開かれた。</span>`;
            }
        } else {
            gameOver();
        }
    }

    function triggerEvent() {
        const eventText = document.getElementById('event-text');
        const container = document.getElementById('main-container');
        const rand = Math.random();

        if (rand < 0.5) {
            isGoldenEvent = true;
            eventText.innerText = "― 星々の導き：天啓が授けられた ―";
            document.querySelectorAll('.door-btn').forEach(btn => btn.classList.add('golden-door'));
        } else {
            eventText.innerText = "― 運命の揺らぎ：試練が訪れる ―";
            container.classList.add('shake');
        }
    }

    function endEvent() {
        isGoldenEvent = false;
        document.getElementById('event-text').innerText = "";
        document.getElementById('main-container').classList.remove('shake');
        document.querySelectorAll('.door-btn').forEach(btn => btn.classList.remove('golden-door'));
    }

    function gameOver() {
        const gameUI = document.getElementById('game-ui');
        const resetBtn = document.getElementById('reset-btn');
        const resultUI = document.getElementById('result-ui');
        const prob = (Math.pow(0.5, streak) * 100).toFixed(streak > 10 ? 6 : 2);
        
        saveScore(streak);
        endEvent();

        gameUI.style.display = 'none';
        resetBtn.style.display = 'block';
        
        resultUI.innerHTML = `
            <span style="font-size:1.2rem; color:var(--gold);">審判が下りました。</span><br>
            到達の確率: <b>${prob}%</b><br>
            <span style="font-size:0.8rem; color:var(--silver); opacity:0.8;">${getMessage(streak)}</span>
        `;
        updateRankingDisplay();
    }

    function getMessage(s) {
        if (s === 0) return "まだ一歩も踏み出していません。";
        if (s < 5) return "人としての運命を全うしました。";
        if (s < 10) return "その歩みは静かなる奇跡です。";
        return "あなたは星々の理さえも超越しました。";
    }

    function saveScore(score) {
        if (score === 0) return;
        let rankings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        rankings.push({ score: score, date: new Date().toLocaleDateString() });
        rankings.sort((a, b) => b.score - a.score);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(rankings.slice(0, 3)));
    }

    function updateRankingDisplay() {
        const list = document.getElementById('ranking-list');
        const rankings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        list.innerHTML = rankings.map((r, i) => `
            <div class="ranking-item">
                <span>Rank ${i + 1}</span>
                <span>${r.score} Steps</span>
                <span>${r.date}</span>
            </div>
        `).join('');
    }

    function resetGame() {
        streak = 0;
        document.getElementById('streak').innerText = "0";
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('result-ui').innerHTML = "";
        endEvent();
    }
</script>

</body>
</html>

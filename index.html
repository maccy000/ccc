<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oraculum - 慈悲の審判</title>
    <style>
        :root {
            --deep-blue: #020617;
            --gold: #d4af37;
            --silver: #e2e8f0;
            --accent: #f59e0b;
            --safety: #34d399;
        }

        body {
            font-family: 'Times New Roman', serif;
            background: var(--deep-blue);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: var(--silver); overflow: hidden;
        }

        #stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            opacity: 0.5;
        }

        /* 導入・説明画面 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
        }

        .content-box {
            max-width: 480px; width: 85%; padding: 2.5rem;
            border: 1px solid var(--gold); text-align: center;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
        }

        .content-box h2 { color: var(--gold); letter-spacing: 0.4rem; margin-bottom: 1.5rem; }
        .content-box ul { text-align: left; font-size: 0.85rem; line-height: 1.8; padding-left: 1rem; margin-bottom: 2rem; }
        .content-box li { margin-bottom: 8px; list-style-type: '✦ '; }

        .container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            width: 90%;
            max-width: 500px;
            display: none; /* 初期は非表示 */
        }

        .life-area { color: var(--safety); font-size: 0.8rem; margin-bottom: 10px; letter-spacing: 0.2rem; }
        .rank-badge { font-size: 0.7rem; letter-spacing: 0.3rem; color: var(--gold); border: 1px solid var(--gold); padding: 5px 15px; display: inline-block; margin-bottom: 1rem; }
        .current-streak { font-size: 5rem; font-weight: 100; margin: 0; }
        .message-area { height: 50px; color: var(--accent); font-style: italic; margin: 15px 0; font-size: 0.85rem; }

        .btn-group { display: flex; gap: 12px; margin: 20px 0; justify-content: center; }
        
        button {
            background: transparent; color: var(--silver); border: 1px solid var(--silver);
            padding: 15px; cursor: pointer; transition: all 0.3s;
            letter-spacing: 0.1rem; font-family: inherit; flex: 1;
        }
        button:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        /* ヒントの強調 */
        .hint { border-color: var(--safety) !important; box-shadow: 0 0 15px var(--safety); color: var(--safety) !important; }

        .special-panel { display: none; border: 1px double var(--gold); padding: 15px; margin-top: 15px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="stars"></div>

<div id="intro-overlay" class="overlay">
    <div class="content-box">
        <h2>ORACULUM</h2>
        <p style="font-size: 0.9rem; margin-bottom: 1.5rem;">運命の二択へようこそ。以下の加護を授けます。</p>
        <ul>
            <li><strong>守護の輝石:</strong> 1回だけミスを無効化します。</li>
            <li><strong>導きの光:</strong> 5連勝ごとに、次の正解が緑色に輝きます。</li>
            <li><strong>聖者の賭け:</strong> 3連勝ごとに「1/3で2点獲得」に挑戦できます。</li>
            <li><strong>階位の昇格:</strong> 連勝を重ねることで、称号が進化します。</li>
        </ul>
        <button style="width:100%; border-color:var(--gold); color:var(--gold);" onclick="startGame()">儀式を始める</button>
    </div>
</div>

<div class="container" id="game-container">
    <div id="life" class="life-area">✦ 守護の輝石: 1 ✦</div>
    <div id="rank" class="rank-badge">PILGRIM</div>
    <div id="streak" class="current-streak">0</div>
    <div id="message" class="message-area">運命を選択してください</div>

    <div id="standard-ui">
        <div class="btn-group">
            <button id="btn-0" onclick="play(2, 0)">SINISTER</button>
            <button id="btn-1" onclick="play(2, 1)">DEXTER</button>
        </div>
    </div>

    <div id="branch-ui" class="special-panel">
        <p style="font-size:0.75rem; margin-bottom:10px; color:var(--gold);">― 運命の分岐点 ―</p>
        <div class="btn-group">
            <button onclick="setupMode('normal')">通常の道 (1/2)</button>
            <button style="border-color:var(--accent); color:var(--accent);" onclick="setupMode('gamble')">聖者の賭け (1/3)</button>
        </div>
    </div>

    <div id="triple-ui" class="special-panel">
        <div class="btn-group">
            <button id="t-0" onclick="play(3, 0)">I</button>
            <button id="t-1" onclick="play(3, 1)">II</button>
            <button id="t-2" onclick="play(3, 2)">III</button>
        </div>
    </div>

    <div id="result-log" style="margin-top:15px; min-height:40px; font-size:0.8rem;"></div>
    <button id="reset-btn" style="display:none; width:100%; margin-top:10px; border-color:var(--gold); color:var(--gold);" onclick="location.reload()">再挑戦</button>
</div>

<script>
    let streak = 0;
    let lives = 1; 
    let isGuiding = false; 

    function startGame() {
        document.getElementById('intro-overlay').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
    }

    function setupMode(mode) {
        document.getElementById('branch-ui').style.display = 'none';
        if (mode === 'gamble') {
            document.getElementById('triple-ui').style.display = 'block';
            document.getElementById('message').innerText = "三位一体の試練：成功すれば二歩進む";
        } else {
            document.getElementById('standard-ui').style.display = 'block';
            document.getElementById('message').innerText = "堅実なる道";
        }
    }

    function play(chance, choiceIndex) {
        const winningNumber = Math.floor(Math.random() * chance);
        const resultLog = document.getElementById('result-log');
        
        document.getElementById('standard-ui').style.display = 'none';
        document.getElementById('triple-ui').style.display = 'none';
        removeHints();

        if (choiceIndex === winningNumber) {
            const gain = (chance === 3) ? 2 : 1;
            streak += gain;
            document.getElementById('streak').innerText = streak;
            
            // 5連勝ボーナス
            if (streak > 0 && streak % 5 === 0) {
                isGuiding = true;
                resultLog.innerHTML = "<span style='color:var(--safety)'>「導きの光」が次の扉を照らします。</span>";
            } else {
                resultLog.innerHTML = "運命は継続を認めました。";
            }

            // 3連勝チェック
            if (streak > 0 && streak % 3 === 0) {
                document.getElementById('branch-ui').style.display = 'block';
            } else {
                showNormalUI();
            }
        } else {
            if (lives > 0) {
                lives--;
                updateLifeDisplay();
                resultLog.innerHTML = "<span style='color:var(--gold)'>守護の輝石が砕け、命を繋ぎ止めた...</span>";
                showNormalUI();
            } else {
                gameOver();
            }
        }
        updateRank();
    }

    function showNormalUI() {
        document.getElementById('standard-ui').style.display = 'block';
        if (isGuiding) {
            // 次のターンの正解を光らせる（導きの光）
            // 内部的な次の正解を予測するのではなく、今のUI状態でガイドを出す
            const hintIdx = Math.floor(Math.random() * 2); 
            // ※厳密には「次」のplay時に判定されるので、このターンのボタンを光らせる仕様
            document.getElementById(`btn-${hintIdx}`).classList.add('hint');
            document.getElementById('message').innerText = "導きの光が扉を照らしている...";
            isGuiding = false;
        } else {
            document.getElementById('message').innerText = "運命を選択してください";
        }
    }

    function removeHints() {
        document.getElementById('btn-0').classList.remove('hint');
        document.getElementById('btn-1').classList.remove('hint');
    }

    function updateLifeDisplay() {
        document.getElementById('life').innerText = `✦ 守護の輝石: ${lives} ✦`;
        if (lives === 0) document.getElementById('life').style.color = "#666";
    }

    function updateRank() {
        const r = document.getElementById('rank');
        if (streak >= 10) r.innerText = "OBSERVER";
        if (streak >= 20) r.innerText = "ORACLE";
    }

    function gameOver() {
        document.getElementById('message').innerText = "運命の糸が切れました";
        document.getElementById('result-log').innerHTML = `最終スコア: ${streak}`;
        document.getElementById('reset-btn').style.display = 'block';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oraculum - 運命の審判</title>
    <style>
        :root {
            --deep-blue: #020617;
            --gold: #d4af37;
            --silver: #e2e8f0;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Times New Roman', serif;
            background: var(--deep-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--silver);
            overflow: hidden;
        }

        #stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: -1;
            opacity: 0.3;
        }

        /* オーバーレイ共通 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease;
        }

        .content-box {
            max-width: 500px;
            width: 85%;
            padding: 2.5rem;
            border: 1px solid var(--gold);
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
        }

        h2 { color: var(--gold); letter-spacing: 0.5rem; margin-bottom: 1.2rem; font-size: 1.5rem; }
        p { line-height: 1.6; font-size: 0.9rem; margin-bottom: 1rem; color: var(--silver); }
        
        .ranking-list {
            margin: 1.5rem 0;
            padding: 0;
            list-style: none;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            text-align: left;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 5px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            font-size: 0.85rem;
        }

        .container {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            width: 90%;
            max-width: 500px;
            display: none;
        }

        .rank-badge { font-size: 0.7rem; letter-spacing: 0.3rem; color: var(--gold); border: 1px solid var(--gold); padding: 5px 15px; display: inline-block; margin-bottom: 1rem; }
        .current-streak { font-size: 6rem; font-weight: 100; margin: 0; line-height: 1; }
        .event-banner { height: 60px; color: var(--accent); font-style: italic; margin: 15px 0; font-size: 0.9rem; }

        .btn-group { display: flex; gap: 20px; margin: 20px 0; }
        
        button {
            background: transparent;
            color: var(--silver);
            border: 1px solid var(--silver);
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.2rem;
            font-family: inherit;
        }
        button:hover { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .choice-ui { display: none; padding: 20px; border: 1px double var(--gold); margin-top: 20px; }
        .reset-btn { display: none; width: 100%; margin-top: 20px; }

        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-4px,2px); } 75% { transform: translate(4px,-2px); } }
        .shake { animation: shake 0.1s infinite; }
    </style>
</head>
<body>

<div id="stars"></div>

<div id="intro-overlay" class="overlay">
    <div class="content-box">
        <h2>THE ORACULUM</h2>
        <p>ここは運命の神殿。あなたの歩みは「二分の一」の選択のみで決まります。</p>
        
        <div style="font-size: 0.8rem; color: var(--gold); margin-top: 20px;">― 過去の聖遺録 ―</div>
        <div id="intro-ranking" class="ranking-list">
            </div>

        <button style="width: 100%; border-color: var(--gold); margin-top: 1rem;" onclick="startGame()">儀式を始める</button>
    </div>
</div>

<div class="container" id="main-container">
    <div id="rank" class="rank-badge">NOVICE</div>
    <div id="streak" class="current-streak">0</div>
    <div id="event-text" class="event-banner"></div>

    <div id="game-ui">
        <div class="btn-group">
            <button onclick="handleInput(0)">SINISTER</button>
            <button onclick="handleInput(1)">DEXTER</button>
        </div>
    </div>

    <div id="gamble-ui" class="choice-ui">
        <p style="font-size: 0.8rem;">記録を刻み、ここを去りますか？</p>
        <div class="btn-group">
            <button onclick="collectScore()">安息（確定）</button>
            <button style="border-color:var(--accent)" onclick="continueGamble()">渇望（続行）</button>
        </div>
    </div>

    <div id="result-ui" style="margin: 20px 0; min-height: 80px;">
        </div>
    <button id="reset-btn" class="reset-btn" onclick="resetGame()">再誕</button>
</div>

<script>
    let streak = 0;
    let isGolden = false;
    let isReversed = false;
    const STORAGE_KEY = 'oraculum_final_v5';

    window.onload = () => {
        updateRankingDisplay('intro-ranking');
    };

    function startGame() {
        const intro = document.getElementById('intro-overlay');
        const main = document.getElementById('main-container');
        intro.style.opacity = '0';
        setTimeout(() => {
            intro.style.display = 'none';
            main.style.display = 'block';
        }, 800);
    }

    function handleInput(choice) {
        const actual = isReversed ? 1 - choice : choice;
        const winRate = isGolden ? 0.8 : 0.5;
        
        if (Math.random() < winRate) {
            streak++;
            updateUI();
            if (streak % 5 === 0) showGamble();
            else if (streak % 3 === 0) triggerEvent();
            else clearEvent();
        } else {
            gameOver();
        }
    }

    function updateUI() {
        document.getElementById('streak').innerText = streak;
        const rank = document.getElementById('rank');
        const bg = document.getElementById('stars');
        
        if (streak < 5) { rank.innerText = "PILGRIM"; bg.style.opacity = "0.3"; }
        else if (streak < 15) { rank.innerText = "OBSERVER"; bg.style.opacity = "0.7"; }
        else { rank.innerText = "ORACLE"; bg.style.opacity = "1"; }
    }

    function triggerEvent() {
        clearEvent();
        const evs = [
            { t: "黄金の刻", d: "成功率が一時的に向上する", f: () => { isGolden = true; }},
            { t: "混沌の渦", d: "左右の理が逆転する", f: () => { isReversed = true; document.getElementById('main-container').classList.add('shake'); }},
            { t: "忘却の霧", d: "扉の文字が読めなくなる", f: () => { document.querySelectorAll('.btn-group button').forEach(b => b.style.color = 'transparent'); }}
        ];
        const e = evs[Math.floor(Math.random() * evs.length)];
        document.getElementById('event-text').innerHTML = `― ${e.t} ―<br><small>${e.d}</small>`;
        e.f();
    }

    function clearEvent() {
        isGolden = false; isReversed = false;
        document.getElementById('event-text').innerHTML = "";
        document.getElementById('main-container').classList.remove('shake');
        document.querySelectorAll('.btn-group button').forEach(b => b.style.color = '');
    }

    function showGamble() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('gamble-ui').style.display = 'block';
    }

    function collectScore() { gameOver("記録を運命に刻みました。"); }
    function continueGamble() {
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('gamble-ui').style.display = 'none';
        clearEvent();
    }

    function gameOver(msg = "審判が下りました。") {
        saveScore(streak);
        clearEvent();
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('gamble-ui').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'block';
        
        const prob = (Math.pow(0.5, streak)*100).toFixed(6);
        let resultHTML = `<span style="color:var(--gold);">${msg}</span><br>到達確率: ${prob}%<br>`;
        resultHTML += `<div class="ranking-list" id="end-ranking" style="margin-top:10px;"></div>`;
        
        document.getElementById('result-ui').innerHTML = resultHTML;
        updateRankingDisplay('end-ranking');
    }

    function saveScore(s) {
        if (s === 0) return;
        let r = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        r.push({score: s, date: new Date().toLocaleDateString()});
        r.sort((a,b) => b.score - a.score);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(r.slice(0, 5)));
    }

    function updateRankingDisplay(targetId) {
        const list = document.getElementById(targetId);
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        if (data.length === 0) {
            list.innerHTML = "<p style='text-align:center; opacity:0.5;'>記録なし</p>";
            return;
        }
        list.innerHTML = data.map((item, i) => `
            <div class="ranking-item">
                <span>Rank ${i+1}</span>
                <span style="color:var(--gold)">${item.score} Steps</span>
                <span style="font-size:0.7rem; opacity:0.6;">${item.date}</span>
            </div>
        `).join('');
    }

    function resetGame() {
        streak = 0; updateUI(); clearEvent();
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('result-ui').innerHTML = "";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50/50 サバイバル - Ranking Edition</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-color: #16213e;
            --primary-color: #0f3460;
            --accent-color: #e94560;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .container {
            background: var(--card-color);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        .score-board { font-size: 1rem; color: #95a5a6; margin-top: 10px; }
        .current-streak { font-size: 4rem; font-weight: bold; color: #00d2ff; text-shadow: 0 0 10px rgba(0,210,255,0.5); margin: 0.5rem 0; }

        .btn-group { display: flex; gap: 15px; margin: 20px 0; }
        button {
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: all 0.2s;
            font-weight: bold;
        }

        .choice-btn { background: #0f3460; color: white; flex: 1; border: 1px solid #00d2ff; }
        .choice-btn:hover { background: #16213e; box-shadow: 0 0 15px #00d2ff; }
        .choice-btn:active { transform: scale(0.95); }

        .reset-btn { background: var(--accent-color); color: white; display: none; width: 100%; margin-top: 10px; }

        /* ランキングセクション */
        .ranking-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #30475e;
            text-align: left;
        }
        .ranking-title { font-size: 0.9rem; color: #f1c40f; margin-bottom: 10px; text-align: center; }
        .ranking-list { list-style: none; padding: 0; margin: 0; font-size: 0.9rem; }
        .ranking-item { display: flex; justify-content: space-between; padding: 4px 10px; border-radius: 4px; margin-bottom: 2px; }
        .ranking-item:nth-child(1) { background: rgba(241, 196, 15, 0.2); color: #f1c40f; font-weight: bold; }

        .result-msg { min-height: 80px; margin: 15px 0; line-height: 1.5; }
        .highlight { color: #e94560; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin:0">50/50 SURVIVAL</h2>
    <div class="score-board">CURRENT STREAK</div>
    <div id="streak" class="current-streak">0</div>

    <div id="game-ui">
        <div class="btn-group">
            <button class="choice-btn" onclick="play(0)">LEFT</button>
            <button class="choice-btn" onclick="play(1)">RIGHT</button>
        </div>
    </div>

    <div id="result-ui" class="result-msg"></div>
    <button id="reset-btn" class="reset-btn" onclick="resetGame()">RETRY</button>

    <div class="ranking-box">
        <div class="ranking-title">🏆 LOCAL RANKING (TOP 5)</div>
        <div id="ranking-list" class="ranking-list">
            </div>
    </div>
</div>

<script>
    let streak = 0;
    const STORAGE_KEY = 'survival_game_rankings';

    // 起動時にランキングを表示
    window.onload = updateRankingDisplay;

    function play(choice) {
        const winningDoor = Math.floor(Math.random() * 2);
        const resultUI = document.getElementById('result-ui');

        if (choice === winningDoor) {
            streak++;
            document.getElementById('streak').innerText = streak;
            resultUI.innerHTML = `<span style="color: #00ff88;">SAFE... Keep going.</span>`;
        } else {
            gameOver();
        }
    }

    function gameOver() {
        const gameUI = document.getElementById('game-ui');
        const resetBtn = document.getElementById('reset-btn');
        const resultUI = document.getElementById('result-ui');
        
        const prob = (Math.pow(0.5, streak) * 100).toFixed(streak > 10 ? 5 : 2);
        
        // ランキング保存
        const isNewRecord = saveScore(streak);

        gameUI.style.display = 'none';
        resetBtn.style.display = 'block';
        
        resultUI.innerHTML = `
            <span class="highlight">GAME OVER</span><br>
            生存確率: ${prob}%<br>
            ${isNewRecord ? '<span style="color:#f1c40f">★ NEW RECORD! ★</span>' : ''}
        `;
        
        updateRankingDisplay();
    }

    function saveScore(score) {
        if (score === 0) return false;
        
        let rankings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const now = new Date();
        const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
        
        rankings.push({ score: score, date: dateStr });
        // スコア順にソートして上位5つを保持
        rankings.sort((a, b) => b.score - a.score);
        const topRankings = rankings.slice(0, 5);
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(topRankings));
        
        // 今回のスコアがトップ5に入っているか確認
        return topRankings.some(r => r.score === score && r.date === dateStr);
    }

    function updateRankingDisplay() {
        const listElement = document.getElementById('ranking-list');
        const rankings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        
        if (rankings.length === 0) {
            listElement.innerHTML = '<div style="text-align:center; color:#555;">No records yet</div>';
            return;
        }

        listElement.innerHTML = rankings.map((r, i) => `
            <div class="ranking-item">
                <span>${i + 1}. ${r.score}連勝</span>
                <span style="font-size: 0.7rem; color: #888;">${r.date}</span>
            </div>
        `).join('');
    }

    function resetGame() {
        streak = 0;
        document.getElementById('streak').innerText = "0";
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('result-ui').innerHTML = "";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oraculum - 聖者の賭け</title>
    <style>
        :root {
            --deep-blue: #020617;
            --gold: #d4af37;
            --silver: #e2e8f0;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Times New Roman', serif;
            background: var(--deep-blue);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: var(--silver); overflow: hidden;
        }

        #stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            opacity: 0.5;
        }

        .container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        /* 導入画面 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
        }

        .content-box {
            max-width: 450px; width: 85%; padding: 2rem;
            border: 1px solid var(--gold); text-align: center;
        }

        .rank-badge {
            font-size: 0.7rem; letter-spacing: 0.3rem; color: var(--gold);
            border: 1px solid var(--gold); padding: 5px 15px;
            display: inline-block; margin-bottom: 1rem;
        }

        .current-streak { font-size: 6rem; font-weight: 100; margin: 0; line-height: 1; }
        
        .message-area { height: 60px; color: var(--accent); font-style: italic; margin: 20px 0; font-size: 0.9rem; }

        .btn-group { display: flex; gap: 15px; margin: 20px 0; justify-content: center; flex-wrap: wrap; }
        
        button {
            background: transparent; color: var(--silver); border: 1px solid var(--silver);
            padding: 15px 25px; cursor: pointer; transition: all 0.3s;
            letter-spacing: 0.1rem; font-family: inherit; flex: 1; min-width: 120px;
        }
        button:hover { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .choice-panel {
            display: none; border: 1px double var(--gold);
            padding: 20px; margin-top: 20px; animation: fadeIn 0.5s;
        }

        .ranking-box {
            margin-top: 20px; border-top: 1px solid rgba(212,175,55,0.2);
            padding-top: 15px; font-size: 0.8rem; text-align: left;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="stars"></div>

<div id="intro-overlay" class="overlay">
    <div class="content-box">
        <h2 style="color:var(--gold); letter-spacing:0.5rem;">ORACULUM</h2>
        <p style="font-size:0.85rem; line-height:1.8;">
            三連勝の節目に「聖者の賭け」が解禁されます。<br>
            三分の一の試練を乗り越えし者には、<br>二歩分の前進が約束されるでしょう。
        </p>
        <button style="width:100%; border-color:var(--gold);" onclick="closeIntro()">儀式を始める</button>
    </div>
</div>

<div class="container" id="main-ui" style="display:none;">
    <div id="rank" class="rank-badge">PILGRIM</div>
    <div id="streak" class="current-streak">0</div>
    <div id="message" class="message-area"></div>

    <div id="standard-ui">
        <div class="btn-group">
            <button onclick="play(2)">SINISTER</button>
            <button onclick="play(2)">DEXTER</button>
        </div>
    </div>

    <div id="branch-ui" class="choice-panel">
        <p style="font-size:0.8rem; margin-bottom:15px;">運命の分岐点：挑戦を選びますか？</p>
        <div class="btn-group">
            <button onclick="setupMode('normal')">通常の道 (1/2)</button>
            <button style="border-color:var(--accent); color:var(--accent);" onclick="setupMode('gamble')">聖者の賭け (1/3)</button>
        </div>
    </div>

    <div id="triple-ui" class="choice-panel">
        <div class="btn-group">
            <button onclick="play(3)">TRIAD I</button>
            <button onclick="play(3)">TRIAD II</button>
            <button onclick="play(3)">TRIAD III</button>
        </div>
    </div>

    <div id="result-log" style="margin-top:20px; min-height:50px;"></div>
    <button id="reset-btn" style="display:none; width:100%; margin-top:20px;" onclick="location.reload()">再誕</button>
    
    <div id="ranking" class="ranking-box"></div>
</div>

<script>
    let streak = 0;
    const STORAGE_KEY = 'oraculum_saint_rank';

    function closeIntro() {
        document.getElementById('intro-overlay').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        showRanking();
    }

    function setupMode(mode) {
        document.getElementById('branch-ui').style.display = 'none';
        if (mode === 'gamble') {
            document.getElementById('triple-ui').style.display = 'block';
            document.getElementById('message').innerText = "三位一体の試練：的中すれば二歩進む";
        } else {
            document.getElementById('standard-ui').style.display = 'block';
            document.getElementById('message').innerText = "堅実なる歩み";
        }
    }

    function play(chance) {
        const isWin = Math.random() < (1 / chance);
        const resultLog = document.getElementById('result-log');
        
        // UIを一旦隠す
        document.getElementById('standard-ui').style.display = 'none';
        document.getElementById('triple-ui').style.display = 'none';
        document.getElementById('message').innerText = "";

        if (isWin) {
            // 1/3なら+2、それ以外(1/2)なら+1
            const gain = (chance === 3) ? 2 : 1;
            streak += gain;
            document.getElementById('streak').innerText = streak;
            updateRank();

            // 3連勝(またはそれ以上)のチェック
            if (streak > 0 && streak % 3 === 0) {
                document.getElementById('branch-ui').style.display = 'block';
                resultLog.innerHTML = `<span style="color:var(--gold)">奇跡の連鎖。さらなる賭けに挑みますか？</span>`;
            } else {
                document.getElementById('standard-ui').style.display = 'block';
                resultLog.innerHTML = "運命は継続を認めました。";
            }
        } else {
            gameOver();
        }
    }

    function updateRank() {
        const r = document.getElementById('rank');
        if (streak >= 7) r.innerText = "OBSERVER";
        if (streak >= 15) r.innerText = "TRANSCENDER";
        if (streak >= 30) r.innerText = "ORACLE";
    }

    function gameOver() {
        const prob = (Math.pow(0.5, streak) * 100).toFixed(6);
        document.getElementById('result-log').innerHTML = 
            `<span style="color:var(--gold)">審判が下りました。</span><br>到達確率: ${prob}%`;
        document.getElementById('reset-btn').style.display = 'block';
        saveScore(streak);
        showRanking();
    }

    function saveScore(s) {
        if (s === 0) return;
        let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        data.push({score: s, date: new Date().toLocaleDateString()});
        data.sort((a,b) => b.score - a.score);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data.slice(0, 5)));
    }

    function showRanking() {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const box = document.getElementById('ranking');
        if (data.length === 0) return;
        box.innerHTML = "<div style='text-align:center; margin-bottom:10px; opacity:0.6'>聖遺録</div>" + 
            data.map((d, i) => `<div style="display:flex; justify-content:space-between; padding:2px 0;">
                <span>Rank ${i+1}</span><span>${d.score} Steps</span>
            </div>`).join('');
    }
</script>
</body>
</html>
